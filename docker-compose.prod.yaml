# ─────────────────────────────────────────────────────────────────────────────
# Ouija — production Docker Compose
#
# Nginx runs inside Docker but uses the TLS certs that Certbot manages on the
# host at /etc/letsencrypt — the same certs your existing setup already has.
#
# Usage:
#   cp .env.production .env   # fill in your values
#   docker compose -f docker-compose.prod.yaml up -d --build
# ─────────────────────────────────────────────────────────────────────────────

services:

  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    restart: unless-stopped
    command: redis-server --requirepass "${REDIS_PASSWORD}" --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - internal

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL:                    ${DATABASE_URL}
      REDIS_PASSWORD:                  ${REDIS_PASSWORD}
      REDIS_HOST:                      redis
      REDIS_PORT:                      6379
      SMTP_HOST:                       ${SMTP_HOST}
      SMTP_PORT:                       ${SMTP_PORT:-587}
      SMTP_SECURE:                     ${SMTP_SECURE:-false}
      SMTP_USER:                       ${SMTP_USER}
      SMTP_PASSWORD:                   ${SMTP_PASSWORD}
      SMTP_FROM:                       ${SMTP_FROM}
      APP_URL:                         ${APP_URL}
      CDN_BASE_URL:                    ${CDN_BASE_URL}
      AUTH_REQUIRE_EMAIL_VERIFICATION: ${AUTH_REQUIRE_EMAIL_VERIFICATION:-false}
      AUTH_ENABLE_PASSWORD_RESET:      ${AUTH_ENABLE_PASSWORD_RESET:-false}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - internal
    volumes:
      - media-uploads:/app/uploads

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        CDN_BASE_URL:        ${CDN_BASE_URL}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      APP_URL:             ${APP_URL}
      CDN_BASE_URL:        ${CDN_BASE_URL}
    depends_on:
      api:
        condition: service_healthy
    networks:
      - internal

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Mount the host's Certbot-managed certs read-only into the container.
      # These are the same certs your existing Nginx setup already uses.
      - /etc/letsencrypt:/etc/letsencrypt:ro
      # Shared webroot for ACME challenges during renewal
      - certbot-www:/var/www/certbot:ro
    depends_on:
      - api
      - web
    networks:
      - internal

  certbot:
    image: certbot/certbot:latest
    restart: unless-stopped
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    # Attempts renewal every 12 h; certbot skips if cert is not due yet.
    entrypoint: /bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot --webroot-path /var/www/certbot --quiet; sleep 12h & wait $${!}; done'

volumes:
  pg-data:
  redis-data:
  media-uploads:
  certbot-www:

networks:
  internal:
    driver: bridge
