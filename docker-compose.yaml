services:
  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks:
      - app-network

  redis:
    image: redis:7
    restart: always
    command: redis-server --requirepass "${REDIS_PASSWORD}"
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - app-network

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: ouija-api-app
    image: guc10/ouija-api
    pull_policy: never
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM:-Ouija <noreply@ouija.local>}
      APP_URL: ${APP_URL:-http://localhost:3000}
      CDN_BASE_URL: ${CDN_BASE_URL:-http://localhost:3001}
      AUTH_REQUIRE_EMAIL_VERIFICATION: ${AUTH_REQUIRE_EMAIL_VERIFICATION}
      AUTH_ENABLE_PASSWORD_RESET: ${AUTH_ENABLE_PASSWORD_RESET}
    ports:
      - "3001:3001"
    depends_on:
      - postgres
      - redis
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://ouija-api-app:3001/api/health" ]
      interval: 5s
      timeout: 10s
      retries: 5
    networks:
      - app-network
    volumes:
      - media-uploads:/app/uploads

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
        - CDN_BASE_URL=${CDN_BASE_URL}
    container_name: ouija-web-app
    image: guc10/ouija-web
    pull_policy: never
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
      APP_URL: ${APP_URL:-http://localhost:3000}
      CDN_BASE_URL: ${CDN_BASE_URL:-http://localhost:3001/api/media}
    ports:
      - "3000:3000"
    depends_on:
      - api
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://ouija-web-app:3000" ]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app-network

volumes:
  redis-data:
  pg-data:
  media-uploads:

networks:
  app-network:
    driver: bridge