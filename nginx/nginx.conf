events {
    worker_connections 1024;
}

http {
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;

    # 1. WEB (ouija.rytui.dev) -> web container port 3000
    server {
        listen 443 ssl;
        server_name ouija.rytui.dev;

        ssl_certificate     /etc/letsencrypt/live/ouija.rytui.dev/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/ouija.rytui.dev/privkey.pem;
        include             /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

        location / {
            proxy_pass         http://web:3000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }

    # 2. API (api-ouija.rytui.dev) -> api container port 3001
    server {
        listen 443 ssl;
        server_name api-ouija.rytui.dev;

        ssl_certificate     /etc/letsencrypt/live/ouija.rytui.dev/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/ouija.rytui.dev/privkey.pem;
        include             /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

        client_max_body_size 15m;

        location / {
            proxy_pass         http://api:3001;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
        }
    }

    # 3. CDN (cdn-ouija.rytui.dev) -> api container port 3001/api/media
    server {
        listen 443 ssl;
        server_name cdn-ouija.rytui.dev;

        ssl_certificate     /etc/letsencrypt/live/ouija.rytui.dev/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/ouija.rytui.dev/privkey.pem;
        include             /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

        client_max_body_size 15m;

        location / {
            add_header Cross-Origin-Resource-Policy "cross-origin" always;
            add_header Access-Control-Allow-Origin "*" always;
            proxy_pass         http://api:3001/api/media/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }

    # HTTP -> HTTPS redirects
    server {
        listen 80;
        server_name ouija.rytui.dev;
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 80;
        server_name api-ouija.rytui.dev;
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 80;
        server_name cdn-ouija.rytui.dev;
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
        location / {
            return 301 https://$host$request_uri;
        }
    }
}